const catClassFn=cat=>catClass[cat]||"cat-M";
const lvlClassFn=lvl=>lvlClass[lvl]||"lvl-easy";

function buildTable(){
  const tbody=document.getElementById('tbody');
  data.forEach(r=>{
    const tags=r[6].split(',').map(t=>`<span>${t.trim()}</span>`).join('');
    const tr=document.createElement('tr');
    tr.dataset.search=[r[1],r[2],r[3],r[4],r[5],r[6]].join(' ').toLowerCase();
    tr.dataset.cat=r[1];
    tr.dataset.lvl=r[7];
    tr.dataset.type=r[8];
    tr.innerHTML=`
      <td class="num">${r[0]}</td>
      <td><span class="cat ${catClassFn(r[1])}">${r[1]}</span></td>
      <td><strong class="title">${r[2]}</strong></td>
      <td>${r[3]}</td>
      <td>${r[4]}</td>
      <td>${r[5]}</td>
      <td class="tags">${tags}</td>
      <td><span class="lvl ${lvlClassFn(r[7])}">${r[7]}</span></td>
      <td>${r[8]}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('headerStats').textContent=
    `${data.length} problems · 10 categories · Diode and Fiber Laser · Sources: xTool Support, Sawmill Creek, OMG Laser, LaserTips.org, LA Hobby Guy, cnc.info.pl, signs.pl, elektroda.pl`;
  updateStats(data.length);
}

function updateStats(n){
  document.getElementById('stats').textContent=`${n} / ${data.length} problems`;
}

window.filter=function(){
  const q=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('catFilter').value;
  const lvl=document.getElementById('lvlFilter').value;
  const type=document.getElementById('typeFilter').value;
  let visible=0;
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const ok=(!q||tr.dataset.search.includes(q))
           &&(!cat||tr.dataset.cat===cat)
           &&(!lvl||tr.dataset.lvl===lvl)
           &&(!type||tr.dataset.type.includes(type));
    tr.classList.toggle('hidden',!ok);
    if(ok)visible++;
  });
  updateStats(visible);
  document.getElementById('noResults').style.display=visible===0?'block':'none';
}

buildTable();

(function(){
  var params=new URLSearchParams(window.location.search);
  var q=params.get('q');
  if(q){
    document.getElementById('search').value=q;
    window.filter();
    document.querySelector('.toolbar').scrollIntoView({behavior:'smooth'});
  }
})();
</script>
